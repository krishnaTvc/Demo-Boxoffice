apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-boxoffice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-boxoffice
  template:
    metadata:
      labels:
        app: demo-boxoffice
    spec:
      containers:
        - name: demo-boxoffice
          image: demo-boxoffice:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # For Azure Cosmos DB (Mongo API), override MONGO_URL via a Secret
            # kubectl create secret generic mongo-secret --from-literal=MONGO_URL='mongodb://user:password@host:port/...'
            # And use valueFrom: secretKeyRef...
            - name: MONGO_URL
              value: "mongodb://mongo:27017" 
            - name: DB_NAME
              value: "demo_boxoffice"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
